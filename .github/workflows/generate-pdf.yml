name: Generate PDF CVs

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'index.en.html'
      - 'style.css'

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installe Node.js (nécessaire pour Puppeteer)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Installe Puppeteer (navigateur headless qui génère le PDF)
      - name: Install Puppeteer
        run: npm install puppeteer

      # 4. Génère les deux PDFs via un script Node.js
      - name: Generate PDFs
        run: node generate-pdf.js

      # 5. Commit et push les PDFs générés dans le repo
      - name: Commit PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.fr.pdf cv.en.pdf
          git diff --staged --quiet || git commit -m "chore: auto-generate PDFs [skip ci]"
          git push
